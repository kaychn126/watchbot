name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './watchbot-tauri/src-tauri -> target'

      - name: Install npm dependencies
        working-directory: ./watchbot-tauri
        run: npm install

      - name: Build Tauri app
        working-directory: ./watchbot-tauri
        run: npm run build -- --verbose
        env:
          TAURI_PRIVATE_KEY: ''
          TAURI_KEY_PASSWORD: ''

      - name: Find build artifacts
        run: |
          Get-ChildItem -Path "watchbot-tauri/src-tauri/target/release/bundle" -Recurse -File | Select -Expand FullName

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: watchbot-windows
          path: |
            watchbot-tauri/src-tauri/target/release/bundle/nsis/*.exe

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: watchbot-windows

      - name: List downloaded files
        run: ls -la

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: "*.exe"
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
